<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#1d1033"/>
      <stop offset="1" stop-color="#07050d"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="0.55" stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="face-top" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#efe0ff"/>
      <stop offset="0.5" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="face-left" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="face-right" x1="1" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#2e0d5e"/>
    </linearGradient>
  </defs>

  <!-- Premium dark tile -->
  <rect width="256" height="256" rx="58" fill="url(#bg)"/>
  <rect width="256" height="256" rx="58" fill="url(#sheen)"/>

  <!-- Brand glow behind the gem -->
  <ellipse cx="128" cy="124" rx="112" ry="112" fill="url(#glow)"/>

  <!-- Soft contact shadow -->
  <ellipse cx="128" cy="230" rx="74" ry="13" fill="#000000" fill-opacity="0.38"/>

  <!-- Isometric "Onyx" gem — sized to fill the tile -->
  <g stroke-linejoin="round">
    <!-- left face -->
    <path d="M44 78 L128 126 L128 224 L44 176 Z" fill="url(#face-left)"/>
    <!-- right face -->
    <path d="M212 78 L128 126 L128 224 L212 176 Z" fill="url(#face-right)"/>
    <!-- top face -->
    <path d="M128 28 L212 78 L128 126 L44 78 Z" fill="url(#face-top)"/>

    <!-- crisp top-edge highlight -->
    <path d="M128 28 L212 78 L128 126 L44 78 Z" fill="none" stroke="#f7efff" stroke-width="3" stroke-opacity="0.9"/>
    <!-- inner vertical seam for facet depth -->
    <path d="M128 126 L128 224" fill="none" stroke="#c4b5fd" stroke-width="2.5" stroke-opacity="0.5"/>
    <!-- outer left rim light -->
    <path d="M44 78 L44 176 L128 224" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-opacity="0.4"/>
  </g>
</svg>
