name: Feature request
description: Suggest an idea or improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the idea. Describing the *problem* helps us shape the right fit.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: The friction or use case behind the request — not just the solution.
      placeholder: I keep losing track of which repos I forgot to push before the weekend…
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Your proposed solution or rough idea of how it could work.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - Port Mapper
        - Session Guard
        - Git Pulse
        - Dev Cleanser
        - OS Power Manager
        - Focus Mode
        - Launchers
        - Snippets
        - Inspector
        - System Tray
        - AI features
        - Settings / theming
        - Other
    validations:
      required: false
